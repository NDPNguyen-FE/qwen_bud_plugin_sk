<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thư viện Module Tủ</title>
  <style>
    :root {
      --bg: #1e1e2e;
      --surface: #2a2a3e;
      --surface-hover: #33334d;
      --border: #3d3d5c;
      --accent: #7c82f5;
      --accent-hover: #9499ff;
      --success: #4ade80;
      --error: #f87171;
      --warning: #fbbf24;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --radius: 8px;
      --tr: 0.15s ease;
      --cat-bep: #fb923c;
      --cat-phong-ngu: #a78bfa;
      --cat-phong-khach: #34d399;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #2a3d5c 0%, #1e2e4a 100%);
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-title { font-size: 15px; font-weight: 700; }
    .header-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* Search & Filter bar */
    .toolbar {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 140px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 7px 11px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    .search-box:focus { border-color: var(--accent); }

    .filter-btn {
      padding: 7px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all var(--tr);
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(124,130,245,0.1); }

    /* Grid */
    .grid-container {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .category-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 10px;
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .category-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .category-label:first-child { margin-top: 0; }

    .templates-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 10px;
      margin-bottom: 8px;
    }

    .template-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all var(--tr);
      overflow: hidden;
    }
    .template-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(124,130,245,0.2);
    }
    .template-card.selected {
      border-color: var(--accent);
      background: rgba(124,130,245,0.08);
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 4/3;
      background: linear-gradient(135deg, #2d2d4e 0%, #1e1e35 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      border-bottom: 1px solid var(--border);
    }

    .card-body { padding: 10px 10px 12px; }
    .card-name { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
    .card-meta {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 99px;
      font-weight: 600;
    }
    .badge-cat-bep  { background: rgba(251,146,60,0.15); color: var(--cat-bep); }
    .badge-cat-phong-ngu { background: rgba(167,139,250,0.15); color: var(--cat-phong-ngu); }
    .badge-cat-phong-khach { background: rgba(52,211,153,0.15); color: var(--cat-phong-khach); }
    .badge-panels { background: rgba(148,153,255,0.1); color: var(--text-muted); }
    .badge-user { background: rgba(251,191,36,0.1); color: var(--warning); }

    .empty { text-align: center; color: var(--text-muted); padding: 40px 20px; }
    .empty .icon { font-size: 40px; opacity: 0.3; }

    /* Footer actions */
    .footer {
      border-top: 1px solid var(--border);
      padding: 12px 14px;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn {
      padding: 9px 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all var(--tr);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary { background: var(--accent); color: #fff; flex: 1; justify-content: center; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 76px;
      left: 50%;
      transform: translateX(-50%) translateY(40px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.25s ease, opacity 0.25s ease;
      opacity: 0;
      z-index: 100;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.success { border-color: var(--success); color: var(--success); }
    #toast.error   { border-color: var(--error);   color: var(--error); }
    #toast.info    { border-color: var(--accent);  color: var(--accent); }

    /* Save user template modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .modal-title { font-size: 15px; font-weight: 700; }
    .modal label { font-size: 11px; font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 4px; }
    .modal input, .modal select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 8px 10px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    .modal input:focus, .modal select:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 8px; }
    .modal-actions .btn { flex: 1; justify-content: center; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">📚 Thư viện Module Tủ</div>
    <div class="header-sub">Chọn template để chèn vào model</div>
  </div>

  <div class="toolbar">
    <input class="search-box" id="search" type="text" placeholder="🔍 Tìm template...">
    <button class="filter-btn active" data-cat="all" onclick="filterCategory('all', this)">Tất cả</button>
    <button class="filter-btn" data-cat="bếp" onclick="filterCategory('bếp', this)">🍳 Bếp</button>
    <button class="filter-btn" data-cat="phòng ngủ" onclick="filterCategory('phòng ngủ', this)">🛏 Phòng ngủ</button>
    <button class="filter-btn" data-cat="phòng khách" onclick="filterCategory('phòng khách', this)">🛋 Phòng khách</button>
  </div>

  <div class="grid-container" id="grid-container">
    <div class="empty"><div class="icon">📦</div><p>Đang tải thư viện...</p></div>
  </div>

  <div class="footer">
    <button class="btn btn-secondary" onclick="openSaveDialog()">💾 Lưu vào thư viện</button>
    <button class="btn btn-primary" id="insert-btn" disabled onclick="insertSelected()">
      ➕ Chèn vào Model
    </button>
  </div>

  <!-- Save user template modal -->
  <div class="modal-overlay" id="save-modal">
    <div class="modal">
      <div class="modal-title">💾 Lưu Template Tự Tạo</div>
      <div>
        <label for="tmpl-name">Tên template <span style="color:#f87171">*</span></label>
        <input type="text" id="tmpl-name" placeholder="VD: Tủ giày 4 ngăn">
      </div>
      <div>
        <label for="tmpl-cat">Danh mục</label>
        <select id="tmpl-cat">
          <option value="bếp">Bếp</option>
          <option value="phòng ngủ">Phòng ngủ</option>
          <option value="phòng khách">Phòng khách</option>
          <option value="khác">Khác</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeSaveDialog()">Hủy</button>
        <button class="btn btn-primary" onclick="saveUserTemplate()">Lưu</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    // =========================================================================
    // State
    // =========================================================================
    let allTemplates = [];
    let selectedId   = null;
    let activeCategory = 'all';
    let searchQuery  = '';

    const CATEGORY_ICONS = {
      'bếp':         '🍳',
      'phòng ngủ':   '🛏',
      'phòng khách': '🛋',
      'khác':        '📦'
    };

    const TEMPLATE_ICONS = {
      'kitchen_base_600':    '🗄',
      'kitchen_base_corner': '🔲',
      'kitchen_upper_600':   '🗃',
      'wardrobe_2door':      '🚪',
      'drawer_single':       '📥',
      'bookshelf_simple':    '📚'
    };

    // =========================================================================
    // Init
    // =========================================================================
    window.onload = function() {
      sketchup.get_templates();
      document.getElementById('search').addEventListener('input', function() {
        searchQuery = this.value.toLowerCase();
        renderGrid();
      });
    };

    // Called from Ruby
    function loadTemplates(templates) {
      allTemplates = templates;
      renderGrid();
    }

    // =========================================================================
    // Render
    // =========================================================================
    function renderGrid() {
      const container = document.getElementById('grid-container');
      let filtered = allTemplates.filter(t => {
        const matchCat = activeCategory === 'all' || t.category === activeCategory;
        const matchSearch = !searchQuery ||
          t.name.toLowerCase().includes(searchQuery) ||
          t.category.toLowerCase().includes(searchQuery);
        return matchCat && matchSearch;
      });

      if (!filtered.length) {
        container.innerHTML = `<div class="empty"><div class="icon">🔍</div><p>Không tìm thấy template phù hợp.</p></div>`;
        return;
      }

      // Group by category
      const groups = {};
      filtered.forEach(t => {
        if (!groups[t.category]) groups[t.category] = [];
        groups[t.category].push(t);
      });

      let html = '';
      Object.entries(groups).forEach(([cat, items]) => {
        const icon = CATEGORY_ICONS[cat] || '📦';
        html += `<div class="category-label">${icon} ${cat.charAt(0).toUpperCase() + cat.slice(1)}</div>`;
        html += `<div class="templates-grid">`;
        items.forEach(t => {
          const tmplIcon = TEMPLATE_ICONS[t.id] || '🗄';
          const catClass = 'badge-cat-' + cat.replace(/\s+/g, '-');
          const selectedClass = t.id === selectedId ? ' selected' : '';
          html += `
            <div class="template-card${selectedClass}" onclick="selectTemplate('${t.id}')" ondblclick="insertSelected()">
              <div class="card-thumb">${tmplIcon}</div>
              <div class="card-body">
                <div class="card-name">${t.name}</div>
                <div class="card-meta">
                  <span class="badge ${catClass}">${cat}</span>
                  <span class="badge badge-panels">${t.panel_count} tấm</span>
                  ${t.user ? '<span class="badge badge-user">Tự tạo</span>' : ''}
                </div>
              </div>
            </div>
          `;
        });
        html += `</div>`;
      });

      container.innerHTML = html;
    }

    function filterCategory(cat, btn) {
      activeCategory = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    }

    function selectTemplate(id) {
      selectedId = id;
      document.getElementById('insert-btn').disabled = false;
      renderGrid();
    }

    // =========================================================================
    // Actions
    // =========================================================================
    function insertSelected() {
      if (!selectedId) { showToast('Chọn một template trước', 'error'); return; }
      showToast('Đang chèn template...', 'info');
      sketchup.insert_template(selectedId);
    }

    function openSaveDialog() {
      document.getElementById('save-modal').classList.add('open');
      document.getElementById('tmpl-name').focus();
    }

    function closeSaveDialog() {
      document.getElementById('save-modal').classList.remove('open');
    }

    function saveUserTemplate() {
      const name = document.getElementById('tmpl-name').value.trim();
      const cat  = document.getElementById('tmpl-cat').value;
      if (!name) {
        document.getElementById('tmpl-name').style.borderColor = '#f87171';
        return;
      }
      closeSaveDialog();
      sketchup.save_user_template(JSON.stringify({ name, category: cat }));
    }

    // =========================================================================
    // Callbacks from Ruby
    // =========================================================================
    function showInsertSuccess(templateId, count) {
      showToast(`✅ Đã chèn ${count} tấm ván vào model`, 'success');
    }

    function showInsertError(msg) {
      showToast('❌ ' + msg, 'error');
    }

    function showSaveSuccess() {
      showToast('✅ Đã lưu template vào thư viện', 'success');
    }

    function showSaveError(msg) {
      showToast('❌ ' + msg, 'error');
    }

    // =========================================================================
    // Toast
    // =========================================================================
    let toastTimer = null;
    function showToast(msg, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `show ${type}`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.className = ''; }, 2600);
    }
  </script>
</body>
</html>
